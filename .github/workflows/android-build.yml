name: Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - android-app/**
      - .github/workflows/android-build.yml
  pull_request:
    branches:
      - main
    paths:
      - android-app/**
      - .github/workflows/android-build.yml

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses > /dev/null || true

      - name: Install Android packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.3.11579264" \
            "cmake;3.22.1"

      - name: Create local.properties
        run: |
          SDK_PATH="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          if [ -z "$SDK_PATH" ]; then
            echo "Android SDK path was not provided by the runner." >&2
            exit 1
          fi
          echo "sdk.dir=$SDK_PATH" > local.properties
          cat local.properties

      - name: Build debug and release APKs
        run: gradle --no-daemon assembleDebug assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: helios3-debug-apk
          path: android-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: helios3-release-apk
          path: android-app/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
